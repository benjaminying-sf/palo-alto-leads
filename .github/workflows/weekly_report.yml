name: Weekly Lead Report

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load previous leads from JSON store
        run: python3 scripts/load_leads.py

      - name: Run weekly report
        env:
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:   ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT:      ${{ secrets.EMAIL_RECIPIENT }}
          COURTLISTENER_TOKEN:  ${{ secrets.COURTLISTENER_TOKEN }}
        run: python main.py

      - name: Export leads to JSON store
        run: python3 scripts/export_leads.py

      - name: Commit updated lead history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leads.json docs/runs.json
          git diff --staged --quiet || git commit -m "Update lead history [skip ci]"
          git push
